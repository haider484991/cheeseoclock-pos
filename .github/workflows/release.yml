name: Release

# Push a tag like `v0.1.1` to trigger an automated build + GitHub Release.
# The release is initially a draft — review it and click "Publish release"
# to make installed apps start auto-updating.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create a GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build + publish to GitHub Releases
        # The `publish: github` block in apps/pos/electron-builder.yml tells
        # electron-builder where to upload. `--publish always` forces it to
        # publish even if not on a tag (we ARE on a tag — belt + braces).
        run: pnpm --filter @cheeseoclock/pos exec electron-vite build && pnpm --filter @cheeseoclock/pos exec rimraf node_modules/@cheeseoclock && pnpm --filter @cheeseoclock/pos exec electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing — leave unset to ship unsigned (SmartScreen warning).
          # When you buy a cert, store it as a repo secret and uncomment:
          # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          # Crash reporting — sign up at sentry.io (free 5K events/month):
          # SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
